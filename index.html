  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

4px\">\n    <div style=\"font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#C9A961;font-weight:600\">Superior Tribunal de Justiça<\u002Fdiv>\n    <div style=\"font-size:20px;font-weight:700;line-height:1.2\">Matriz de Priorização de Indicadores — LOGOS<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n<div style=\"background:#00224a;height:6px\"><div style=\"height:100%;background:#C9A961;transition:width .3s;width:{{progressPct}}%\"><\u002Fdiv><\u002Fdiv>\n\n<main style=\"flex:1;width:100%;max-width:880px;margin:0 auto;padding:26px 20px 60px;box-sizing:border-box;display:flex;flex-direction:column;gap:16px\">\n\n<sc-if value=\"{{onIntro}}\" hint-placeholder-val=\"{{true}}\">\n  <div style=\"background:#fff;border:1px solid #dde2e9;border-radius:10px;padding:28px 26px;display:flex;flex-direction:column;gap:18px;box-shadow:0 1px 3px rgba(16,32,64,.06)\">\n    <div style=\"font-size:16px;font-weight:700;color:#002B5B\">Como funciona<\u002Fdiv>\n    <p style=\"margin:0;font-size:14.5px;line-height:1.65;color:#3a4552\">São <b>13 critérios de seleção<\u002Fb> — uma página para cada. Em cada página você:<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px;line-height:1.5;color:#3a4552\">\n      <div style=\"display:flex;gap:10px\"><span style=\"flex:none;width:24px;height:24px;border-radius:50%;background:#002B5B;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center\">1<\u002Fspan><span>Define o <b>peso<\u002Fb> do critério (1 a 5, conforme relevância). A soma dos 13 pesos deve fechar em <b>50<\u002Fb>.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:10px\"><span style=\"flex:none;width:24px;height:24px;border-radius:50%;background:#002B5B;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center\">2<\u002Fspan><span>Marca, para cada um dos <b>24 indicadores<\u002Fb>, se ele <b>atende (1)<\u002Fb> ou <b>não atende (0)<\u002Fb> ao critério.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px\">\n      <label style=\"display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#2b3644\">Nome completo *\n        <input value=\"{{nome}}\" onchange=\"{{setNome}}\" placeholder=\"Seu nome\" style=\"border:1.5px solid #c4ccd6;border-radius:7px;padding:10px 12px;font-size:15px;outline-color:#0d3b74\">\n      <\u002Flabel>\n      <label style=\"display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#2b3644\">Unidade / Gabinete *\n        <input value=\"{{unidade}}\" onchange=\"{{setUnidade}}\" placeholder=\"Ex: Gabinete Min. …\" style=\"border:1.5px solid #c4ccd6;border-radius:7px;padding:10px 12px;font-size:15px;outline-color:#0d3b74\">\n      <\u002Flabel>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:flex-end\">\n      <button onclick=\"{{next}}\" disabled=\"{{introBlocked}}\" style=\"background:#002B5B;color:#fff;border:none;border-radius:8px;padding:12px 26px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;opacity:{{introBtnOpacity}}\">Começar →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{onCrit}}\" hint-placeholder-val=\"{{false}}\">\n  <div style=\"display:flex;flex-direction:column;gap:14px\">\n\n    <div style=\"background:#fff;border:1px solid #dde2e9;border-radius:10px;padding:20px 22px;display:flex;flex-direction:column;gap:14px;box-shadow:0 1px 3px rgba(16,32,64,.06)\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8a93a0\">Critério {{critNum}} de 13<\u002Fdiv>\n        <div style=\"display:flex;gap:4px\">\n          <sc-for list=\"{{dots}}\" as=\"d\" hint-placeholder-count=\"13\">\n            <span title=\"{{d.title}}\" style=\"width:9px;height:9px;border-radius:50%;background:{{d.bg}};display:inline-block\"><\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:18px;font-weight:700;line-height:1.35;color:#002B5B\">{{critName}}<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap\">\n        <div style=\"font-size:13.5px;font-weight:600;color:#2b3644\">Peso deste critério:<\u002Fdiv>\n        <div style=\"display:flex;gap:6px\">\n          <sc-for list=\"{{pesoBtns}}\" as=\"p\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{p.pick}}\" style=\"width:42px;height:42px;border:1.5px solid {{p.bd}};background:{{p.bg}};color:{{p.fg}};border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit\">{{p.n}}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:13px;font-weight:600;color:{{sumColor}};margin-left:auto\">Soma dos pesos: {{pesosSum}} / 50<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#fff;border:1px solid #dde2e9;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(16,32,64,.06)\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#f4f6fa;border-bottom:1px solid #e8ecf1;gap:10px;flex-wrap:wrap\">\n        <div style=\"font-size:13.5px;color:#3a4552\">O indicador <b>atende<\u002Fb> a este critério?<\u002Fdiv>\n        <button onclick=\"{{markAll}}\" style=\"background:none;border:1.5px solid #c4ccd6;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#2b3644\">{{markAllLabel}}<\u002Fbutton>\n      <\u002Fdiv>\n      <sc-for list=\"{{groups}}\" as=\"g\" hint-placeholder-count=\"6\">\n        <div style=\"padding:9px 20px 4px;font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#8a6a1e;background:#faf7ef;border-bottom:1px solid #f0ead8\">{{g.name}}<\u002Fdiv>\n        <sc-for list=\"{{g.rows}}\" as=\"r\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{r.toggle}}\" style=\"display:flex;align-items:center;gap:14px;padding:10px 20px;border-bottom:1px solid #eef1f5;cursor:pointer;background:{{r.rowBg}}\">\n            <div style=\"flex:1;font-size:14px;line-height:1.4\">{{r.name}}<\u002Fdiv>\n            <div style=\"flex:none;display:flex;border:1.5px solid #c4ccd6;border-radius:7px;overflow:hidden;font-size:12.5px;font-weight:700\">\n              <span style=\"padding:7px 13px;background:{{r.simBg}};color:{{r.simFg}}\">Atende<\u002Fspan>\n              <span style=\"padding:7px 13px;background:{{r.naoBg}};color:{{r.naoFg}};border-left:1.5px solid #c4ccd6\">Não<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;justify-content:space-between;gap:10px\">\n      <button onclick=\"{{prev}}\" style=\"background:#fff;color:#2b3644;border:1.5px solid #c4ccd6;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">← Voltar<\u002Fbutton>\n      <button onclick=\"{{next}}\" disabled=\"{{critBlocked}}\" style=\"background:#002B5B;color:#fff;border:none;border-radius:8px;padding:11px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;opacity:{{critBtnOpacity}}\">{{critNextLabel}}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{onReview}}\" hint-placeholder-val=\"{{false}}\">\n  <div style=\"display:flex;flex-direction:column;gap:14px\">\n    <div style=\"font-size:13.5px;line-height:1.55;color:#3a4552;background:#e9eef6;border-radius:8px;padding:12px 16px\">Confira o resumo antes de enviar. Clique em um critério para revisar.<\u002Fdiv>\n\n    <sc-if value=\"{{sumWrong}}\" hint-placeholder-val=\"{{false}}\">\n      <div style=\"background:#fbe9e7;border:1px solid #e5b3ac;color:#8c2f24;border-radius:8px;padding:12px 16px;font-size:13.5px;font-weight:600\">A soma dos pesos está em {{pesosSum}} — ajuste os critérios para totalizar 50 antes de enviar.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"background:#fff;border:1px solid #dde2e9;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(16,32,64,.06)\">\n      <div style=\"padding:12px 20px;background:#f4f6fa;border-bottom:1px solid #e8ecf1;font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#002B5B\">Pesos por critério<\u002Fdiv>\n      <sc-for list=\"{{revCrits}}\" as=\"c\" hint-placeholder-count=\"13\">\n        <div onclick=\"{{c.go}}\" style=\"display:flex;align-items:center;gap:12px;padding:9px 20px;border-bottom:1px solid #eef1f5;cursor:pointer\">\n          <div style=\"flex:none;width:22px;font-size:12px;font-weight:700;color:#8a93a0\">{{c.num}}<\u002Fdiv>\n          <div style=\"flex:1;font-size:13.5px;line-height:1.35\">{{c.name}}<\u002Fdiv>\n          <div style=\"flex:none;font-size:12.5px;color:#5a6572\">{{c.atende}} de 24 atendem<\u002Fdiv>\n          <div style=\"flex:none;width:34px;height:26px;border-radius:6px;background:#002B5B;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center\">{{c.peso}}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <div style=\"display:flex;justify-content:flex-end;align-items:center;gap:10px;padding:12px 20px;background:{{sumRowBg}};color:#fff;font-size:14px;font-weight:700\">Soma: {{pesosSum}} / 50<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#fff;border:1px solid #dde2e9;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(16,32,64,.06)\">\n      <div style=\"padding:12px 20px;background:#f4f6fa;border-bottom:1px solid #e8ecf1;font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#002B5B\">Pontuação ponderada por indicador<\u002Fdiv>\n      <sc-for list=\"{{revInds}}\" as=\"r\" hint-placeholder-count=\"8\">\n        <div style=\"display:flex;align-items:center;gap:14px;padding:8px 20px;border-bottom:1px solid #eef1f5\">\n          <div style=\"flex:none;width:88px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#8a6a1e\">{{r.dim}}<\u002Fdiv>\n          <div style=\"flex:1;font-size:13px;line-height:1.35\">{{r.name}}<\u002Fdiv>\n          <div style=\"width:110px;height:8px;background:#eef1f5;border-radius:4px;overflow:hidden;flex:none\"><div style=\"height:100%;background:#C9A961;width:{{r.barW}}%\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"width:40px;text-align:right;font-size:13.5px;font-weight:700;color:#002B5B;flex:none\">{{r.total}}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{sendError}}\" hint-placeholder-val=\"{{false}}\">\n      <div style=\"background:#fbe9e7;border:1px solid #e5b3ac;color:#8c2f24;border-radius:8px;padding:12px 16px;font-size:13.5px\">Não foi possível enviar. Verifique a conexão e tente novamente.<\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"display:flex;justify-content:space-between;gap:10px\">\n      <button onclick=\"{{prev}}\" style=\"background:#fff;color:#2b3644;border:1.5px solid #c4ccd6;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">← Voltar<\u002Fbutton>\n      <button onclick=\"{{submit}}\" disabled=\"{{sendBlocked}}\" style=\"background:#1c6b3c;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;opacity:{{sendBtnOpacity}}\">{{sendLabel}}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{onDone}}\" hint-placeholder-val=\"{{false}}\">\n  <div style=\"background:#fff;border:1px solid #dde2e9;border-radius:10px;padding:48px 26px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;box-shadow:0 1px 3px rgba(16,32,64,.06)\">\n    <div style=\"width:62px;height:62px;border-radius:50%;background:#e5f2e9;color:#1c6b3c;font-size:30px;display:flex;align-items:center;justify-content:center\">✓<\u002Fdiv>\n    <div style=\"font-size:20px;font-weight:700;color:#002B5B\">Resposta registrada<\u002Fdiv>\n    <p style=\"margin:0;font-size:14px;line-height:1.6;color:#3a4552;max-width:420px\">Sua avaliação foi enviada à planilha do Google. Obrigado pela contribuição, {{nomeFirst}}.<\u002Fp>\n    <sc-if value=\"{{demoMode}}\" hint-placeholder-val=\"{{false}}\">\n      <div style=\"background:#fdf6e3;border:1px solid #e3d3a3;color:#7a5d1e;border-radius:8px;padding:10px 16px;font-size:12.5px;max-width:460px\">Modo demonstração: configure a URL do Google Apps Script nos ajustes (Tweaks) para gravar de verdade.<\u002Fdiv>\n    <\u002Fsc-if>\n    <button onclick=\"{{reset}}\" style=\"margin-top:8px;background:none;border:1.5px solid #c4ccd6;border-radius:8px;padding:9px 18px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;color:#2b3644\">Nova resposta<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fmain>\n<footer style=\"padding:16px 24px;text-align:center;font-size:11.5px;color:#8a93a0\">STJ · Projeto LOGOS · Matriz de priorização de indicadores<\u002Ffooter>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;scriptUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Integração Google Sheets&quot;}}\">\nconst CRITERIA = [\n  'Representatividade — proximidade com os objetivos do Logos',\n  'Atendimento às necessidades de informação das partes interessadas',\n  'Confiabilidade metodológica',\n  'Confiabilidade da fonte',\n  'Simplicidade',\n  'Objetividade, clareza e comunicabilidade',\n  'Exequibilidade de mensuração',\n  'Economicidade de obtenção',\n  'Estabilidade ao longo do tempo',\n  'Investigativo (rastreabilidade ao longo do tempo)',\n  'Tempestividade',\n  'Comparabilidade',\n  'Sensibilidade'\n];\nconst DIMS = [\n  {name:'Efetividade', inds:['Tempo médio de tramitação até o julgamento','Taxa de congestionamento líquida','Idade média do acervo','Índice de produtividade processual']},\n  {name:'Eficácia', inds:['Quantidade de minutas efetivamente produzidas com o auxílio do Logos','Índice de aproveitamento (aceitação) de minutas','Taxa de adoção (número de gabinetes usuários)','Taxa de usuários ativos recorrentes']},\n  {name:'Eficiência', inds:['Redução do tempo médio de elaboração de decisões (com e sem o Logos)','Produtividade por servidor (minutas por servidor)','Tempo de resposta do sistema','Custo por minuta gerada']},\n  {name:'Execução', inds:['Percentual de execução do cronograma de implantação do Logos','Taxa de capacitação de servidores/gabinetes','Número de funcionalidades/ferramentas do ecossistema em produção','Volume de uso do Logos']},\n  {name:'Excelência', inds:['Índice de disponibilidade do sistema','Índice de qualidade (taxa de revisão das minutas elaboradas com o Logos)','Índice de satisfação dos usuários','Taxa de erros/imprecisões detectados']},\n  {name:'Economicidade', inds:['Economia de horas de trabalho','Custo total de propriedade do Logos','Custo por processo julgado com o auxílio do Logos','Retorno sobre o investimento']}\n];\nconst ALL_INDS = DIMS.flatMap((d, di) => d.inds.map((ind, ii) => ({ dim: d.name, di, ii, name: ind })));\nconst LS_KEY = 'logos-matriz-v2';\n// steps: 0 intro, 1..13 critérios, 14 revisão, 15 done\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = null;\n    try { saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch (e) {}\n    this.state = saved && saved.pesos ? saved : {\n      step: 0, nome: '', unidade: '', pesos: Array(13).fill(0), marks: {},\n      sending: false, sendError: false, demoMode: false\n    };\n    if (this.state.step === 15) this.state = { ...this.state, step: 14, sending: false };\n  }\n\n  save(patch) {\n    this.setState(patch, () => {\n      const { sending, sendError, ...persist } = this.state;\n      try { localStorage.setItem(LS_KEY, JSON.stringify(persist)); } catch (e) {}\n    });\n  }\n\n  totalFor(di, ii) {\n    let t = 0;\n    for (let c = 0; c < 13; c++) if (this.state.marks[di + '-' + ii + '-' + c]) t += this.state.pesos[c];\n    return t;\n  }\n\n  buildPayload() {\n    const s = this.state;\n    return {\n      timestamp: new Date().toISOString(),\n      nome: s.nome.trim(), unidade: s.unidade.trim(),\n      pesos: s.pesos,\n      avaliacoes: ALL_INDS.map(x => ({\n        dimensao: x.dim, indicador: x.name,\n        criterios: CRITERIA.map((c, ci) => s.marks[x.di + '-' + x.ii + '-' + ci] ? 1 : 0),\n        total: this.totalFor(x.di, x.ii)\n      }))\n    };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const step = s.step;\n    const sum = s.pesos.reduce((a, b) => a + b, 0);\n    const introOk = s.nome.trim().length > 1 && s.unidade.trim().length > 1;\n    const onCrit = step >= 1 && step <= 13;\n    const ci = step - 1;\n    const critPeso = onCrit ? s.pesos[ci] : 0;\n    const allMarked = onCrit && ALL_INDS.every(x => s.marks[x.di + '-' + x.ii + '-' + ci]);\n    const critOk = critPeso >= 1;\n\n    return {\n      progressPct: step === 15 ? 100 : Math.round(step / 14 * 100),\n      onIntro: step === 0, onCrit, onReview: step === 14, onDone: step === 15,\n      nome: s.nome, unidade: s.unidade,\n      nomeFirst: s.nome.trim().split(' ')[0] || '',\n      setNome: e => this.save({ nome: e.target.value }),\n      setUnidade: e => this.save({ unidade: e.target.value }),\n      introBlocked: !introOk, introBtnOpacity: introOk ? 1 : 0.45,\n      next: () => this.save({ step: Math.min(15, step + 1) }),\n      prev: () => this.save({ step: Math.max(0, step - 1) }),\n\n      critNum: ci + 1,\n      critName: CRITERIA[ci] || '',\n      dots: CRITERIA.map((c, i) => ({\n        title: (i + 1) + '. ' + c + ' (peso ' + s.pesos[i] + ')',\n        bg: i === ci ? '#C9A961' : (s.pesos[i] >= 1 ? '#002B5B' : '#d5dae2')\n      })),\n      pesoBtns: [1, 2, 3, 4, 5].map(n => ({\n        n, pick: () => { const pesos = s.pesos.slice(); pesos[ci] = n; this.save({ pesos }); },\n        bg: critPeso === n ? '#002B5B' : '#fff', fg: critPeso === n ? '#fff' : '#2b3644', bd: critPeso === n ? '#002B5B' : '#c4ccd6'\n      })),\n      pesosSum: sum,\n      sumColor: sum === 50 ? '#1c6b3c' : (sum > 50 ? '#b0384f' : '#5a6572'),\n      sumRowBg: sum === 50 ? '#1c6b3c' : '#7a3b4a',\n      markAll: () => {\n        const marks = { ...s.marks };\n        ALL_INDS.forEach(x => { marks[x.di + '-' + x.ii + '-' + ci] = !allMarked; });\n        this.save({ marks });\n      },\n      markAllLabel: allMarked ? 'Desmarcar todos' : 'Marcar todos como \"Atende\"',\n      groups: DIMS.map((d, di) => ({\n        name: d.name,\n        rows: d.inds.map((ind, ii) => {\n          const key = di + '-' + ii + '-' + ci;\n          const on = !!s.marks[key];\n          return {\n            name: ind,\n            rowBg: on ? '#f5f9f4' : '#fff',\n            simBg: on ? '#1c6b3c' : '#fff', simFg: on ? '#fff' : '#9aa4b0',\n            naoBg: on ? '#fff' : '#5a6572', naoFg: on ? '#9aa4b0' : '#fff',\n            toggle: () => this.save({ marks: { ...s.marks, [key]: !on } })\n          };\n        })\n      })),\n      critBlocked: !critOk, critBtnOpacity: critOk ? 1 : 0.45,\n      critNextLabel: critOk ? (step === 13 ? 'Revisar respostas →' : 'Próximo critério →') : 'Defina o peso para avançar',\n\n      sumWrong: sum !== 50,\n      revCrits: CRITERIA.map((c, i) => ({\n        num: i + 1, name: c, peso: s.pesos[i],\n        atende: ALL_INDS.filter(x => s.marks[x.di + '-' + x.ii + '-' + i]).length,\n        go: () => this.save({ step: i + 1 })\n      })),\n      revInds: ALL_INDS.map(x => {\n        const total = this.totalFor(x.di, x.ii);\n        return { dim: x.dim, name: x.name, total, barW: Math.min(100, Math.round(total / 50 * 100)) };\n      }),\n      sending: s.sending, sendError: s.sendError,\n      sendBlocked: s.sending || sum !== 50,\n      sendLabel: s.sending ? 'Enviando…' : 'Enviar respostas ✓',\n      sendBtnOpacity: (s.sending || sum !== 50) ? 0.5 : 1,\n      submit: () => this.submit(),\n      demoMode: s.demoMode,\n      reset: () => this.save({ step: 0, nome: '', unidade: '', pesos: Array(13).fill(0), marks: {}, sending: false, sendError: false, demoMode: false })\n    };\n  }\n\n  submit() {\n    const cfg = (typeof window !== 'undefined' && typeof window.LOGOS_SCRIPT_URL === 'string' && window.LOGOS_SCRIPT_URL.indexOf('http') === 0) ? window.LOGOS_SCRIPT_URL : '';\n    const url = (cfg || this.props.scriptUrl || '').trim();\n    this.setState({ sending: true, sendError: false });\n    if (!url) {\n      setTimeout(() => this.save({ sending: false, demoMode: true, step: 15 }), 900);\n      return;\n    }\n    fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(this.buildPayload()) })\n      .then(() => this.save({ sending: false, demoMode: false, step: 15 }))\n      .catch(() => this.setState({ sending: false, sendError: true }));\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
